<div class="form-check custom-checkbox">
  <input
    class="form-check-input"
    type="checkbox"
    [checked]="checked"
    (change)="onChange($event)"
    [id]="label"
    [style.width]="width"
    [style.height]="height"
  />
  <label class="form-check-label" [for]="label">
    {{ label }}
  </label>
</div>
