<app-page-layout title="Professores">
  <div class="d-flex justify-content-end mb-3">
    @if (showSearch) {
    <input
      class="form-control w-25 me-2"
      placeholder="Pesquisar..."
      [(ngModel)]="searchTerm"
    />
    }
    <button class="btn btn-outline-secondary" (click)="toggleSearch()">
      <i class="bi bi-search"></i>
    </button>
  </div>

  <app-table [columns]="columns">
    @for (teacher of filteredTeachers; track $index) {
    <tr>
      <td>{{ teacher.id }}</td>
      <td>{{ teacher.name }}</td>
      <td>{{ teacher.email }}</td>
      <td>
        <div>
          <button
            class="btn btn-outline-secondary btn-sm m-1"
            title="Editar"
            (click)="[modal.open(), edit(teacher)]"
          >
            <i class="bi bi-pencil"></i>
          </button>
          <button
            class="btn btn-outline-danger btn-sm m-1"
            title="Deletar"
            (click)="delete(teacher)"
          >
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </td>
    </tr>
    }
  </app-table>

  <div class="d-flex justify-content-between align-items-center mt-4">
    <div class="flex-grow-1 d-flex justify-content-center">
      <app-pagination
        [totalPages]="pageSize"
        [currentPage]="page"
        (pageChange)="page = $event"
      >
      </app-pagination>
    </div>

    <app-button
      variant="primary"
      size="md"
      (buttonClick)="[modal.open(), (isEditing = false)]"
      >Adicionar</app-button
    >
  </div>
</app-page-layout>

<!-- ============================================ -->
<!-- MODAL GENÉRICO COM FORMULÁRIO -->
<!-- ============================================ -->
<app-modal-generic
  #modal
  title="Cadastrar Professor"
  actionText="Cadastrar"
  actionText2="Cancelar"
  (confirmed)="save()"
  [canCloseOnAction]="formGroupTeacher.valid"
  (cancelled)="reset()"
>
  <form [formGroup]="formGroupTeacher">
    <app-input
      type="text"
      label="Nome"
      placeholder="Digite o nome"
      formControlName="name"
      id="name"
      [control]="formGroupTeacher.get('name')"
    />

    <app-input
      type="email"
      label="Email"
      placeholder="Digite o email"
      formControlName="email"
      id="email"
      [control]="formGroupTeacher.get('email')"
    />
  </form>
</app-modal-generic>
