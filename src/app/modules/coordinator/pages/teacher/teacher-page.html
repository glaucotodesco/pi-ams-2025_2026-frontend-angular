<!--Inicio: Container e titulo-->
<app-page-layout title="Professores">
  <!-- Linha superior: botão de pesquisa -->
  <div class="d-flex justify-content-end align-items-center mb-3">
    @if (showSearch) {
    <div class="input-group me-2">
      <input
        type="text"
        class="form-control"
        placeholder="Pesquisar..."
        [(ngModel)]="searchTerm"
      />
    </div>
    }
    <button
      class="btn btn-outline-secondary"
      (click)="toggleSearch()"
      title="Pesquisar"
    >
      <i class="bi bi-search"></i>
    </button>
  </div>

  <app-table [columns]="columns">
    @for (curso of filteredTeachers; track $index) {
    <tr>
      <td>{{ curso.id }}</td>
      <td>{{ curso.name }}</td>
      <td>{{ curso.type }}</td>
      <td>{{ curso.phone }}</td>
      <td>{{ curso.components }}</td>
      <td>
        <div>
          <button class="btn btn-outline-secondary btn-sm m-1" title="Editar">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger btn-sm m-1" title="Deletar">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </td>
    </tr>
    }
  </app-table>

  <!-- Pagination + botão -->
  <div class="d-flex align-items-center justify-content-between mt-5 mb-3">
    <div class="flex-grow-1 d-flex justify-content-center">
      <app-pagination
        [totalPages]="pageSize"
        [currentPage]="page"
        (pageChange)="refreshTeachers()"
      ></app-pagination>
    </div>

    <app-button variant="primary" size="md" (buttonClick)="modal.open()"
      >Adicionar</app-button
    >
  </div>
</app-page-layout>

<app-modal-generic #modal title="Cadastro"> </app-modal-generic>
