<!--Inicio: Container e titulo-->
<app-page-layout title="Cursos">
  <!-- Linha superior: botão de pesquisa -->
  <div class="d-flex justify-content-end align-items-center mb-3">
    @if (showSearch) {
    <div class="input-group me-2">
      <input type="text" class="form-control" placeholder="Pesquisar..." [(ngModel)]="searchTerm" />
    </div>
    }
    <button class="btn btn-outline-secondary" (click)="toggleSearch()" title="Pesquisar">
      <i class="bi bi-search"></i>
    </button>
  </div>

  <app-table [columns]="columns">
    @for (course of filteredCourses; track $index) {
    <tr>
      <td>{{ course.id }}</td>
      <td>{{ course.name }}</td>
      <td>{{ course.modality }}</td>
      <td>{{ course.technologicalAxis }}</td>
      <td>{{ course.componentsCount }}</td>
      <td>
        <div>
          <button class="btn btn-outline-secondary btn-sm m-1" title="Editar">
            <i class="bi bi-pencil"></i>
          </button>
          <button class="btn btn-outline-danger btn-sm m-1" title="Deletar">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </td>
    </tr>
    }
  </app-table>

  <!-- Pagination + botão -->
  <div class="d-flex align-items-center justify-content-between mt-5 mb-3">
    <div class="flex-grow-1 d-flex justify-content-center">
      <app-pagination [totalPages]="pageSize" [currentPage]="page" (pageChange)="refreshCourses()"></app-pagination>
    </div>

    <app-button variant="primary" size="md" (buttonClick)="modal.open()"
      >Adicionar</app-button
    >
  </div>
</app-page-layout>

<app-modal-generic #modal title="Cadastro"> </app-modal-generic>
