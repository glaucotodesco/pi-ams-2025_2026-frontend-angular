<section class="pt-5">
  <div class="d-flex justify-content-between align-items-center">
    <SectionTitle>Salas</SectionTitle>

    <div class="d-flex justify-content-end align-items-center gap-2">
      <div class="input-group">
        <input
          type="text"
          class="form-control"
          placeholder="Pesquisar..."
          [(ngModel)]="searchTerm"
        />
      </div>
      <app-button
        variant="primary"
        size="md"
        (buttonClick)="[modal.open(), (isEditing = false)]"
      >
        <i class="bi bi-plus fs-6"></i>
        Adicionar
      </app-button>
    </div>
  </div>

  <Card class="p-0 px-4">
    <app-table [columns]="columns">
      @for (course of filteredClassrooms; track $index) {
      <tr>
        <td>{{ course.id }}</td>
        <td>{{ course.name }}</td>
        <td>{{ course.location }}</td>
        <td>{{ course.physicalResources }}</td>
        <td>{{ course.softwareResources }}</td>
        <td>{{ course.capacity }}</td>
        <td>
          <button
            class="btn btn-outline-secondary btn-sm m-1"
            (click)="[modal.open(), edit(course)]"
          >
            <i class="bi bi-pencil"></i>
          </button>
          <button
            class="btn btn-outline-danger btn-sm m-1"
            (click)="delete(course)"
          >
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      }
    </app-table>

    <!-- Paginação + Botão adicionar -->

    <app-modal-generic
      #modal
      title="Adicionar Sala"
      actionText="Salvar"
      actionText2="Cancelar"
      (confirmed)="save()"
      [canCloseOnAction]="formGroupClassroom.valid"
      (cancelled)="reset()"
    >
      <form [formGroup]="formGroupClassroom">
        <div class="row g-3">
          <div class="col-12">
            <app-input
              type="text"
              label="Nome"
              placeholder="Digite o nome"
              formControlName="name"
              [control]="formGroupClassroom.get('name')"
            />
          </div>

          <div class="col-md-6">
            <app-input
              type="text"
              label="Localização"
              placeholder="Digite a localização"
              formControlName="location"
              [control]="formGroupClassroom.get('location')"
            />
          </div>

          <div class="col-md-6">
            <app-input
              type="number"
              label="Capacidade"
              placeholder="Número de lugares"
              formControlName="capacity"
              [control]="formGroupClassroom.get('capacity')"
            />
          </div>

          <div class="col-md-6">
            <app-input
              type="text"
              label="Recursos Físicos"
              placeholder="Ex: projetor, ar condicionado"
              formControlName="physicalResources"
              [control]="formGroupClassroom.get('physicalResources')"
            />
          </div>

          <div class="col-md-6">
            <app-input
              type="text"
              label="Recursos de Software"
              placeholder="Ex: AutoCAD, VSCode"
              formControlName="softwareResources"
              [control]="formGroupClassroom.get('softwareResources')"
            />
          </div>

          <div class="col-12 d-flex gap-3 mt-2">
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="practical"
                formControlName="practical"
              />
              <label class="form-check-label" for="practical">
                É prática
              </label>
            </div>
          </div>
        </div>
      </form>
    </app-modal-generic>
  </Card>
  <div class="d-flex align-items-center justify-content-between mt-5 mb-3">
    <div class="flex-grow-1 d-flex justify-content-end">
      <app-pagination
        [totalPages]="pageSize"
        [currentPage]="page"
        (pageChange)="collectionSize = classrooms.length"
      ></app-pagination>
    </div>
  </div>
</section>
