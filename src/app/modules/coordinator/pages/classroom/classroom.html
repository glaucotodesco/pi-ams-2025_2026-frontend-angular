<section class="pt-5">
  <div class="d-flex justify-content-between align-items-center">
    <SectionTitle>Salas</SectionTitle>

        <div class="d-flex justify-content-end align-items-center gap-2">
      <div class="input-group">
        <input
          type="text"
          class="form-control"
          placeholder="Pesquisar..."
          [(ngModel)]="searchTerm"
        />
      </div>
      <app-button
        variant="primary"
        size="md"
        (buttonClick)="[modal.open(), (isEditing = false)]"
      >
        <i class="bi bi-plus fs-6"></i>
        Adicionar
      </app-button>
    </div>
  </div>

<Card class="p-0 px-4">
    <app-table [columns]="columns">
      @for (course of filteredClassrooms; track $index) {
      <tr>
        <td>{{ course.id }}</td>
        <td>{{ course.name }}</td>
        <td>{{ course.location }}</td>
        <td>{{ course.physicalResources }}</td>
        <td>{{ course.softwareResources }}</td>
        <td>{{ course.capacity }}</td>
        <td>
          <button
            class="btn btn-outline-secondary btn-sm m-1"
            (click)="[modal.open(), edit(course)]"
          >
            <i class="bi bi-pencil"></i>
          </button>
          <button
            class="btn btn-outline-danger btn-sm m-1"
            (click)="delete(course)"
          >
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
      }
    </app-table>

    <!-- Paginação + Botão adicionar -->

    <app-modal-generic
      #modal
      title="Adicionar Curso"
      actionText="Salvar"
      actionText2="Cancelar"
      (confirmed)="save()"
      [canCloseOnAction]="formGroupClassroom.valid"
      (cancelled)="reset()"
    >
      <form [formGroup]="formGroupClassroom">
      <app-input
        type="text"
        label="Nome"
        placeholder="Digite o nome"
        formControlName="name"
        [control]="formGroupClassroom.get('name')"
      />
      <app-input
        type="text"
        label="Descrição"
        placeholder="Digite a descrição"
        formControlName="description"
        [control]="formGroupClassroom.get('description')"
      />
    </form>
    </app-modal-generic>
  </Card>
 <div class="d-flex align-items-center justify-content-between mt-5 mb-3">
    <div class="flex-grow-1 d-flex justify-content-end">
      <app-pagination
        [totalPages]="pageSize"
        [currentPage]="page"
        (pageChange)="collectionSize = classrooms.length"
      ></app-pagination>
    </div>
  </div>
</section>
