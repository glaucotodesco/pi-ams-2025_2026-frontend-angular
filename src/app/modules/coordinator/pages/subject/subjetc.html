<app-page-layout title="Disciplinas">
  <div class="d-flex justify-content-end align-items-center mb-3">
    @if (showSearch) {
    <div class="input-group me-2">
      <input
        type="text"
        class="form-control"
        placeholder="Pesquisar..."
        [(ngModel)]="searchTerm"
      />
    </div>
    }
    <div class="d-flex align-items-center mb-3">
      <app-select [itens]="itensSemester"></app-select>
      <app-select [itens]="itensCourse"></app-select>
    </div>
    <button
      class="btn btn-outline-secondary"
      (click)="toggleSearch()"
      title="Pesquisar"
    >
      <i class="bi bi-search"></i>
    </button>
  </div>

  <app-table [columns]="columns">
    @for (subject of filteredSubjects; track $index) {
    <tr>
      <td>{{ subject.id }}</td>
      <td>{{ subject.name }}</td>
      <td>{{ subject.acronym }}</td>
      <td>{{ subject.practicalLessonsCount }}</td>
      <td>{{ subject.semesterNumber }}</td>
      <td>
        <div>
          <button
            class="btn btn-outline-secondary btn-sm m-1"
            title="Editar"
            (click)="[modal.open(), edit(subject)]"
          >
            <i class="bi bi-pencil"></i>
          </button>
          <button
            class="btn btn-outline-danger btn-sm m-1"
            title="Deletar"
            (click)="delete(subject)"
          >
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </td>
    </tr>
    }
  </app-table>

  <div class="d-flex align-items-center justify-content-between mt-5 mb-3">
    <div class="flex-grow-1 d-flex justify-content-center">
      <app-pagination
        [totalPages]="pageSize"
        [currentPage]="page"
        (pageChange)="refreshCurriculums()"
      ></app-pagination>
    </div>

    <app-button
      variant="primary"
      size="md"
      (buttonClick)="[modal.open(), (isEditing = false)]"
      >Adicionar</app-button
    >
  </div>

  <app-modal-generic
    #modal
    title="Adicionar Disciplina"
    actionText="Salvar"
    actionText2="Cancelar"
    (confirmed)="save()"
    [canCloseOnAction]="formGroupSubject.valid"
    (cancelled)="reset()"
  >
    <form [formGroup]="formGroupSubject">
      <div class="row">
        <div class="col-md-6">
          <app-input
            type="text"
            label="Nome"
            placeholder="Digite o nome"
            formControlName="name"
            id="name"
            [control]="formGroupSubject.get('name')"
          />
        </div>
        <div class="col-md-6">
          <app-input
            type="text"
            label="Sigla"
            placeholder="Digite a sigla"
            formControlName="acronym"
            id="acronym"
            [control]="formGroupSubject.get('acronym')"
          />
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-6">
          <app-input
            type="number"
            label="Aulas Práticas"
            placeholder="Digite o número de aulas práticas"
            formControlName="practicalLessonsCount"
            id="practicalLessonsCount"
            [control]="formGroupSubject.get('practicalLessonsCount')"
          />
        </div>
        <div class="col-md-6">
          <app-input
            type="number"
            label="Número do Semestre"
            placeholder="Digite o número do semestre"
            formControlName="semesterNumber"
            id="semesterNumber"
            [control]="formGroupSubject.get('semesterNumber')"
          />
        </div>
      </div>
    </form>
  </app-modal-generic>
</app-page-layout>
