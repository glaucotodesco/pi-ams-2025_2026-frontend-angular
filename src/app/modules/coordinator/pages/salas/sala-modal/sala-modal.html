<div class="modal fade" id="salaModal" tabindex="-1" aria-labelledby="salaModalLabel" aria-hidden="true">
<div class="modal-dialog modal-xl modal-dialog-centered">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title" id="salaModalLabel">Cadastrar Sala</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
</div>
 
      <div class="modal-body">
<form>
<div class="row g-3">
<div class="col-md-4">
<label class="form-label">Nome:</label>
<input type="text" class="form-control" [(ngModel)]="sala.nome" name="nome" placeholder="Digite o nome da sala">
</div>
 
            <div class="col-md-4">
<label class="form-label">Tipo de sala:</label>
<select class="form-select" [(ngModel)]="sala.tipo" name="tipo">
<option value="" disabled selected>Selecione</option>
<option value="Sala">Sala</option>
<option value="Laboratório">Laboratório</option>
</select>
</div>
 
            <div class="col-md-4">
<label class="form-label">Localização:</label>
<select class="form-select" [(ngModel)]="sala.localizacao" name="localizacao">
<option value="" disabled selected>Selecione</option>
<option>Bloco A</option>
<option>Bloco B</option>
</select>
</div>
 
            <div class="col-md-4">
<label class="form-label">Andar:</label>
<select class="form-select" [(ngModel)]="sala.andar" name="andar">
<option value="" disabled selected>Selecione</option>
<option>1º Andar</option>
<option>2º Andar</option>
<option>3º Andar</option>
</select>
</div>
 
            <div class="col-md-4">
<label class="form-label">Capacidade:</label>
<input type="number" class="form-control" [(ngModel)]="sala.capacidade" name="capacidade" placeholder="Ex: 30">
</div>
 
            <div class="col-md-4">
<label class="form-label d-block">Possui Atendimento?</label>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" [(ngModel)]="sala.possuiAtendimento" name="atendimento" value="sim" id="atendimentoSim">
<label class="form-check-label" for="atendimentoSim">Sim</label>
</div>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" [(ngModel)]="sala.possuiAtendimento" name="atendimento" value="nao" id="atendimentoNao">
<label class="form-check-label" for="atendimentoNao">Não</label>
</div>
</div>
</div>
 
          <div class="row g-3 mt-3">
<div class="col-md-6">
<label class="form-label">Itens:</label>
<textarea class="form-control" [(ngModel)]="sala.itens" name="itens" rows="3" placeholder="Escreva aqui..."></textarea>
</div>
 
            <div class="col-md-6">
<label class="form-label">Especificações:</label>
<textarea class="form-control" [(ngModel)]="sala.especificacoes" name="especificacoes" rows="3" placeholder="Escreva aqui..."></textarea>
</div>
</div>
</form>
</div>
 
      <div class="modal-footer">
<button type="button" class="btn btn-outline-primary" (click)="limparCampos()">Limpar Campos</button>
<button type="button" class="btn btn-primary" (click)="salvar()">Cadastrar Sala</button>
</div>
</div>
</div>
</div>
