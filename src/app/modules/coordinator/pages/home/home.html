<section class="pt-5">
  <SectionTitle>{{ welcomeMessage }}</SectionTitle>

  <div class="row mt-4">
    <div class="col-12 col-md-4 mb-1" *ngFor="let card of cards">
      <Card>
        <div class="p-4">
          <h1 class="fw-medium fs-4">{{ card.title }}</h1>
          <div class="d-flex gap-2 align-items-end">
            <span class="fw-medium fs-3">{{ card.value }}</span>
          </div>
        </div>
      </Card>
    </div>
  </div>
</section>
