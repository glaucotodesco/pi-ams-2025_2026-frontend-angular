<section class="pt-5">
  <div class="d-flex justify-content-between align-items-center">
    <SectionTitle>Usuários</SectionTitle>
    <div class="d-flex justify-content-end align-items-center gap-2">
      <input
        class="form-control"
        placeholder="Pesquisar..."
        [(ngModel)]="searchTerm"
      />
      <app-button
        variant="primary"
        size="md"
        (buttonClick)="[modal.open(), (isEditing = false)]"
      >
        <i class="bi bi-plus fs-6"></i>Adicionar</app-button
      >
    </div>
  </div>

  <Card class="p-0 px-4">
    <app-table [columns]="columns">
      @for (user of filteredUsers; track $index) {
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.email }}</td>
        <td>
          <div>
            <button
              class="btn btn-outline-secondary btn-sm m-1"
              title="Editar"
              (click)="[modal.open(), edit(user)]"
            >
              <i class="bi bi-pencil"></i>
            </button>
            <button
              class="btn btn-outline-danger btn-sm m-1"
              title="Deletar"
              (click)="delete(user)"
            >
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </td>
      </tr>
      }
    </app-table>
  </Card>

  <div class="d-flex align-items-center justify-content-between mt-5 mb-3">
    <div class="flex-grow-1 d-flex justify-content-end">
      <app-pagination
        [totalPages]="pageSize"
        [currentPage]="page"
        (pageChange)="page = $event"
      >
      </app-pagination>
    </div>
  </div>
</section>

<!-- ============================================ -->
<!-- MODAL GENÉRICO COM FORMULÁRIO -->
<!-- ============================================ -->
<app-modal-generic
  #modal
  title="Cadastrar Usuário"
  actionText="Cadastrar"
  actionText2="Cancelar"
  (confirmed)="save()"
  [canCloseOnAction]="formGroupUser.valid"
  (cancelled)="reset()"
>
  <form [formGroup]="formGroupUser">
    <app-input
      type="text"
      label="Nome"
      placeholder="Digite o nome"
      formControlName="name"
      id="name"
      [control]="formGroupUser.get('name')"
    />

    <app-input
      type="email"
      label="Email"
      placeholder="Digite o email"
      formControlName="email"
      id="email"
      [control]="formGroupUser.get('email')"
    />
  </form>
</app-modal-generic>
